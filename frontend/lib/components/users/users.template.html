<div class="container" ng-init="init()">
  <div class="row">
    <div class="col-8">
      <span class="display-4">Usuarios</span>
    </div>
    <div class="col-4">
      <div class="input-group input-group-lg">
        <span class="input-group-text" id="basic-addon1"><i class="fa fa-search"></i></span>
        <input type="text" name="text" ng-model="filter.text" class="form-control text-uppercase" placeholder="BUSCAR POR TEXTO" aria-label="BUSCAR POR TEXTO" aria-describedby="basic-addon1">
      </div>
    </div>
    <div class="col-12 mt-2">
      <div class="row">
        <div class="col-3" ng-repeat="u in users">
          <div class="card">
            <div class="card-body">
              <div class="row">
                <div class="col-12 text-center">
                  <img src="./assets/images/user.png" width="120" height="120" alt="">
                </div>
                <div class="col-12 text-center">
                  <strong>@{{u.username}}</strong>
                </div>
                <div class="col-12 text-center" ng-if="u.isAdmin">
                  <span class="badge bg-success">Administrador</span>
                </div>
                <div class="col-6" ng-if="!u.isAdmin">
                  <button class="btn btn-sm btn-light text-primary">
                    <i class="fa fa-pencil"></i>
                  </button>
                </div>
                <div class="col-6 text-end" ng-if="!u.isAdmin">
                  <button class="btn btn-sm btn-light text-danger">
                    <i class="fa fa-trash"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
