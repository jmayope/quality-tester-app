<div class="container" ng-init="init()">
  <div class="row mt-3">
    <div class="col-6 pb-3">
      <button class="btn btn-lg btn-primary me-3">
        <i class="fa fa-circle  me-1"></i>Módelos
      </button>
      <button class="btn btn-lg btn-light text-primary">
        <i class="fa fa-circle me-1"></i>Entidades
      </button>
    </div>
    <div class="col-6 pb-3">
      <div class="input-group input-group-lg">
        <span class="input-group-text" id="basic-addon1"><i class="fa fa-search"></i></span>
        <input type="text" name="text" ng-model="filter.text" class="form-control text-uppercase" placeholder="BUSCAR POR TEXTO" aria-label="BUSCAR POR TEXTO" aria-describedby="basic-addon1">
      </div>
    </div>
    <div class="col-12 mt-3">
      <div class="row">
        <div class="col-3" ng-repeat="e in evaluationModels | filter:filter.text">
          <div class="card">
            <div class="card-body">
              <div class="row">
                <div class="col-12">
                  <span class="badge bg-primary">{{e.code}}</span>&nbsp;<strong>{{e.name | uppercase}}</strong>
                  <span class="float-end badge" ng-class="{'bg-danger': !e.status, 'bg-success': e.status}">{{e.status ? 'Activo' : 'Inactivo'}}</span>
                </div>
                <div class="col-12">
                  <div class="span text-secondary">
                    {{e.description | uppercase}}
                  </div>
                </div>
                <div class="col-12">
                  <hr>
                </div>
                <div class="col-12">
                  <i class="fa fa-calendar me-1"></i>{{e.createdAt | date:'dd/MM/yyyy'}}&nbsp;<i class="fa fa-clock me-1"></i>{{e.createdAt | date:'hh:mm a'}}    
                </div>
                <div class="col-12">
                  <hr>
                </div>
                <div class="col-6">
                  <button class="btn btn-sm btn-light text-primary me-2" ng-click="toggleEvaluationModal(e)">
                    <e class="fa fa-pencil"></e>
                  </button>
                </div>
                <div class="col-6 text-end">
                  <button class="btn btn-sm btn-light text-danger" ng-click="deleteEvaluationModel(e)">
                    <i class="fa fa-trash"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="modal fade"
     ng-class="{'show d-block': isEvaluationOpen}"
     tabindex="-1"
     role="dialog"
     style="background: rgba(0,0,0,0.5);"
     ng-if="isEvaluationOpen">

  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">{{newEvaluationModel.editing ? 'Editando' : 'Nuevo'}}&nbsp;Modelo de Evaluación</h5>
        <button type="button" class="btn-close" ng-click="toggleEvaluationModal()"></button>
      </div>

      <div class="modal-body">
        <form name="residueForm">
          <div class="row">
            <div class="col-4">
              <small class="text-secondary">Código</small>
              <input type="text" disabled name="id" ng-model="newEvaluationModel.id" class="form-control text-uppercase" >
            </div>
            <div class="col-4">
              <small class="text-secondary">Abreviatura</small>
              <input type="text" name="abbr" ng-model="newEvaluationModel.abbr" class="form-control text-uppercase">
            </div>
            <div class="col-4">
              <small class="text-secondary">Nombre</small>
              <input type="text" name="name" ng-model="newEvaluationModel.name" class="form-control text-uppercase">
            </div>
            <div class="col-12">
              <small class="text-secondary">Descripción</small>
              <textarea name="description" rows="5" ng-model="newEvaluationModel.description" class="form-control text-uppercase"></textarea>
            </div>
            <div class="col-12" ng-if="newEvaluationModel.editing">
              <small class="text-secondary">Estado</small>
              <select name="status" ng-model="newEvaluationModel.status" class="form-select">
                <option ng-value="true">ACTIVO</option>
                <option ng-value="false">INACTIVO</option>
              </select>
            </div>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" ng-click="toggleEvaluationModal()">Cerrar</button>
        <button class="btn btn-primary" ng-click="saveEvaluationModel()">Guardar</button>
      </div>

    </div>
  </div>
</div>
